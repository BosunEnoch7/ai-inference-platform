name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=85

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container
        run: docker build --tag ai-inference-platform:${{ github.sha }} .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install security scanners
        run: pip install pip-audit
      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt -r requirements-dev.txt
      - name: Scan repository filesystem
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bicep CLI
        run: az bicep install
      - name: Compile foundation template
        run: az bicep build --file deploy/azure/foundation.bicep --stdout > /dev/null
      - name: Compile application template
        run: az bicep build --file deploy/azure/app.bicep --stdout > /dev/null
      - name: Compile environment parameters
        run: |
          az bicep build-params --file deploy/azure/environments/staging.bicepparam --stdout > /dev/null
          az bicep build-params --file deploy/azure/environments/production.bicepparam --stdout > /dev/null
