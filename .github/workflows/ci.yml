name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=85

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container
        run: docker build --tag ai-inference-platform:${{ github.sha }} .

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-bicep@v2
      - name: Compile foundation template
        run: bicep build deploy/azure/foundation.bicep --stdout > /dev/null
      - name: Compile application template
        run: bicep build deploy/azure/app.bicep --stdout > /dev/null
      - name: Compile environment parameters
        run: |
          bicep build-params deploy/azure/environments/staging.bicepparam --stdout > /dev/null
          bicep build-params deploy/azure/environments/production.bicepparam --stdout > /dev/null
